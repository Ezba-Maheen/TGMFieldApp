plugins {
    id("com.android.application")
    id("com.facebook.react")
}

react {
    reactNativeDir = file("../../node_modules/react-native")
    codegenDir = file("../../node_modules/@react-native/codegen")
    cliFile = file("../../node_modules/@react-native-community/cli/build/bin.js")
}

def enableProguardInReleaseBuilds = false

android {
    namespace "com.tgmfieldapp"
    compileSdkVersion 34
    defaultConfig {
        applicationId "com.tgmfieldapp"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}
dependencies {
    implementation("com.facebook.react:react-android:0.73.6")
    implementation("com.facebook.react:hermes-android:0.73.6")
    implementation("com.swmansion.gesturehandler:react-native-gesture-handler:2.14.0")
    implementation("com.th3rdwave.safeareacontext:react-native-safe-area-context:4.8.2")
    implementation("com.swmansion.rnscreens:react-native-screens:3.25.0")
    implementation("com.oblador:react-native-vector-icons:10.0.0")
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")