- name: Fix ReactNativeApplicationEntryPoint
        run: |
          mkdir -p android/build/generated/autolinking/src/main/java/com/facebook/react
          cat > android/build/generated/autolinking/src/main/java/com/facebook/react/ReactNativeApplicationEntryPoint.java << 'EOF'
          package com.facebook.react;
          import android.content.Context;
          import com.facebook.soloader.SoLoader;
          public class ReactNativeApplicationEntryPoint {
            public static void load(Context context) {
              SoLoader.init(context, false);
            }
          }
          EOF